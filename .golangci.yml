version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - exhaustive
    - gocritic

  settings:
    gosec:
      excludes:
        - G304  # File path from variable — acceptable in CLI tools

  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - gosec
