# example-source.yaml - Drasi Source definition
# Replace kind and properties with your actual source configuration.
# Supported kind values: CosmosGremlin, Kubernetes, PostgreSQL, MySQL, MSSQL, EventHub
#
# For Kubernetes sources, create a kubeconfig secret first:
#   az aks get-credentials --resource-group <rg> --name <cluster> --file - \
#     | kubectl create secret generic k8s-context --from-file=context=/dev/stdin -n drasi-system
apiVersion: v1
kind: Source
name: example-source
spec:
  kind: Kubernetes
  properties:
    kubeConfig:
      kind: Secret
      name: k8s-context
      key: context
