# cosmos-source.yaml — Drasi Source for Azure Cosmos DB (Gremlin API)
# Connects to the Cosmos DB Gremlin account provisioned by infra/modules/cosmos-gremlin.bicep.
# Secret references are resolved by the Drasi resource-provider via Workload Identity.
apiVersion: v1
kind: Source
name: cosmos-source
spec:
  kind: CosmosGremlin
  properties:
    accountEndpoint:
      kind: secret
      vaultName: "$(AZURE_KEY_VAULT_NAME)"
      secretName: "cosmos-connection-string"
    database: "drasidb"
    container: "drasi-graph"
    partitionKey: "pk"
