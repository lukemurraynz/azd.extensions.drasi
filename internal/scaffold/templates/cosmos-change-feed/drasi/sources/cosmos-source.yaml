# cosmos-source.yaml - Drasi Source for Azure Cosmos DB (Gremlin API)
# Replace Key Vault secret references with your actual vault name and secret names.
apiVersion: v1
kind: Source
name: cosmos-source
spec:
  kind: CosmosGremlin
  properties:
    accountEndpoint:
      secretRef:
        vaultName: "<your-keyvault-name>"
        secretName: "cosmos-account-endpoint"
    masterKey:
      secretRef:
        vaultName: "<your-keyvault-name>"
        secretName: "cosmos-master-key"
    database: "<your-database>"
    container: "<your-container>"
