# PostgreSQL source — connects Drasi to a PostgreSQL database via logical replication (CDC).
# Replace the connectionString, database, and tables values for your environment.
# For local dev, use the docker-compose.yml PostgreSQL container.
apiVersion: v1
kind: Source
name: pg-source
spec:
  kind: PostgreSQL
  properties:
    connectionString:
      kind: Secret
      name: pg-source-secrets
      key: connectionString
    database: drasidb
    tables:
      - public.orders
