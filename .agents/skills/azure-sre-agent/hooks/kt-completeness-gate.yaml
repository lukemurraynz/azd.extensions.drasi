# ============================================================
# Global Hook: KT Completeness Gate
# Enforces KT sections for major incidents and production write actions.
# ============================================================
#
# Apply this to require structured analysis before completion:
# - P1/P2 incidents
# - Any response proposing production write actions
#
# Notes:
# - Uses Stop event so final output is validated before completion.
# - Uses fail_mode: Block to prevent bypass on hook failure.
# - Keep max_rejections bounded to avoid endless loops.

name: kt-completeness-gate
event_type: Stop
activation_mode: always
description: >
  Requires Situation Appraisal, Problem Analysis, Decision Analysis, and
  Potential Problem Analysis sections for major incidents and production
  write-action responses.

hook:
  type: prompt
  prompt: |
    You are a safety and quality reviewer for SRE incident responses.

    Review the candidate final response and decide whether KT structure is required.

    KT is required if either condition is true:
    1) Incident severity is P1 or P2, OR
    2) The response proposes production write actions (changes to infrastructure,
       platform configuration, scaling, traffic shifting, rollback, or restarts
       in production).

    When KT is required, verify these sections are present and meaningful:
    - Situation Appraisal
    - Problem Analysis
    - Decision Analysis
    - Potential Problem Analysis

    Decision rules:
    - If KT is required and all sections are present and meaningful -> approve.
    - If KT is required and any section is missing/weak -> reject with explicit missing sections.
    - If KT is not required -> approve.

    $ARGUMENTS

    Return JSON only:
    {"ok": true, "reason": "KT not required for this response."}
    or
    {"ok": true, "reason": "KT sections complete."}
    or
    {"ok": false, "reason": "Missing or insufficient KT section(s): <list>. Add concrete evidence and rationale."}
  model: ReasoningFast
  timeout: 30
  fail_mode: Block
  max_rejections: 3
