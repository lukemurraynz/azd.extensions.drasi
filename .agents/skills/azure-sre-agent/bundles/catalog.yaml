version: 1
bundles:
  - name: base-core
    version: 1.0.0
    purpose: Core production baseline for diagnostics, remediation review, notification, and base trigger patterns.
    path: ./base-core
    depends_on: []
    capabilities:
      - incident-routing
      - diagnostics
      - controlled-remediation
      - notification
      - baseline-health-checks
  - name: aks-production
    version: 1.0.0
    purpose: AKS-focused incident routing, diagnostics, and recurring health checks.
    path: ./aks-production
    depends_on:
      - base-core
    capabilities:
      - aks-incident-diagnostics
      - aks-health-monitoring
  - name: containerapps-production
    version: 1.0.0
    purpose: Container Apps revision-aware diagnostics and response patterns.
    path: ./containerapps-production
    depends_on:
      - base-core
    capabilities:
      - containerapps-incident-diagnostics
      - revision-regression-analysis
  - name: drasi-aks-production
    version: 1.0.0
    purpose: Drasi on AKS incident triage, runtime diagnostics, and validation workflows.
    path: ./drasi-aks-production
    depends_on:
      - base-core
      - aks-production
    capabilities:
      - drasi-lag-staleness-triage
      - drasi-runtime-diagnostics
      - drasi-post-mitigation-validation
  - name: governance-kt
    version: 1.0.0
    purpose: Governance hooks for approval, tool audit, and KT completeness enforcement.
    path: ./governance-kt
    depends_on:
      - base-core
    capabilities:
      - approval-gates
      - audit-hooks
      - kt-policy-enforcement
  - name: connectors-observability
    version: 1.0.0
    purpose: Connector templates for source, incident, and observability integrations.
    path: ./connectors-observability
    depends_on: []
    capabilities:
      - github-integration
      - pagerduty-integration
      - dynatrace-integration
      - azure-managed-grafana-integration
