api_version: azuresre.ai/v1
kind: ScheduledTask
metadata:
  name: containerapps-revision-health
spec:
  name: containerapps-revision-health
  description: Revision comparison task for Container Apps reliability.
  cron: "0 */6 * * *"
  agent_prompt: |
    Validate revision health for <container-app-name>:
    1. Compare current revision with previous revision metrics.
    2. Flag sustained regressions in error rate or latency.
    3. Gather supporting logs and evidence.
    4. Recommend action and rollback trigger.
