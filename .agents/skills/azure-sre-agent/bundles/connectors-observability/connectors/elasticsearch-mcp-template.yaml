api_version: azuresre.ai/v1
kind: DataConnector
spec:
  name: elasticsearch-mcp
  type: Mcp
  endpoint: https://<ELASTICSEARCH_HOST>:9243/mcp/v1
  auth:
    type: Header
    headerName: Authorization
    headerValue: ApiKey <ELASTICSEARCH_API_KEY>

# Ensure Elasticsearch API key has read access to required indices.
