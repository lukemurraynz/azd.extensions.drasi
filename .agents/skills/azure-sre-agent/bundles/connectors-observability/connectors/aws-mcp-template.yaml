api_version: azuresre.ai/v1
kind: DataConnector
spec:
  name: aws-mcp
  type: Mcp
  endpoint: https://<AWS_MCP_ENDPOINT>/mcp/v1
  auth:
    type: Header
    headerName: Authorization
    headerValue: Bearer <AWS_SESSION_TOKEN>

# Ensure AWS credentials have least-privilege access to required services.
