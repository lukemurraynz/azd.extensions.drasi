api_version: azuresre.ai/v2
kind: IncidentFilter
metadata:
  name: drasi-query-staleness
spec:
  incidentPlatform: AzMonitor
  titleContains: "stale"
  agentMode: Review
  maxAutomatedInvestigationAttempts: 3
  isEnabled: true
  azMonitorFilterSettings:
    targetResourceType: Microsoft.ContainerService/managedClusters
