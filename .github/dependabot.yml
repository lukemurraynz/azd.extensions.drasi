version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - "pr: dependencies"
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "pr: dependencies"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "pr: dependencies"
