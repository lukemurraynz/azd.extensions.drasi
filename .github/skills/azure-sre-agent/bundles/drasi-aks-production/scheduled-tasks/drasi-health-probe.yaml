api_version: azuresre.ai/v1
kind: ScheduledTask
metadata:
  name: drasi-health-probe
spec:
  name: drasi-health-probe
  description: Frequent probe for Drasi processing health.
  cron: "*/15 * * * *"
  agent_prompt: |
    Check Drasi health in AKS namespace <namespace>:
    1. Evaluate processing lag/freshness indicators.
    2. Check pod restart anomalies and runtime errors.
    3. Flag degradation trend and likely failure domain.
