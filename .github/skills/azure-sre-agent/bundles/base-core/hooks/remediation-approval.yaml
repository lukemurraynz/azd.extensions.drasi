name: remediation-approval
event_type: Stop
activation_mode: always
description: Requires explicit approval for infrastructure-modifying actions.
hook:
  type: prompt
  prompt: |
    Review the response for production write actions.

    If it includes infrastructure-modifying actions, reject and ask for explicit
    approval before execution. If it is read-only/reporting, approve.

    $ARGUMENTS

    Return JSON only:
    {"ok": true, "reason": "Read-only response."}
    or
    {"ok": false, "reason": "Approval required before remediation action."}
  model: ReasoningFast
  timeout: 30
  fail_mode: Block
  max_rejections: 3
