api_version: azuresre.ai/v1
kind: ScheduledTask
metadata:
  name: daily-health-check
spec:
  name: daily-health-check
  description: Daily baseline health check with bounded execution.
  cron: "0 8 * * *"
  agent_prompt: |
    Run a daily health check for <resource-scope>:
    1. Query health and availability indicators.
    2. Check error-rate and latency trends for the last 24h.
    3. Summarize anomalies and confidence level.
    4. Send a status update only if anomalies are detected.

# Operator note:
# - Set explicit Max executions in the portal/task settings.
# - Use "Run task now" before production enablement.
