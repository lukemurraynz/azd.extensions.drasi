name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  ci-checks:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: ci-checks
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release version inputs
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          test "$(tr -d '[:space:]' < version.txt)" = "${VERSION}"
          MANIFEST_VERSION=$(grep -E '^version:' extension.yaml | head -1 | sed 's/^version:[[:space:]]*//' | tr -d '"'"'"'[:space:]')
          if [ "${MANIFEST_VERSION}" != "${VERSION}" ]; then
            echo "extension.yaml version '${MANIFEST_VERSION}' does not match tag '${VERSION}'"
            exit 1
          fi
          echo "Validated version: ${VERSION}"

      - name: Build all targets
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x build.sh
          ./build.sh "$VERSION"

      - name: Package archives
        shell: bash
        run: |
          mkdir -p dist
          cd bin

          # windows/amd64
          zip ../dist/azd-drasi-windows-amd64.zip windows/amd64/azd-drasi.exe

          # linux/amd64
          tar -czf ../dist/azd-drasi-linux-amd64.tar.gz -C linux/amd64 azd-drasi

          # linux/arm64
          tar -czf ../dist/azd-drasi-linux-arm64.tar.gz -C linux/arm64 azd-drasi

          # darwin/amd64
          tar -czf ../dist/azd-drasi-darwin-amd64.tar.gz -C darwin/amd64 azd-drasi

          # darwin/arm64
          tar -czf ../dist/azd-drasi-darwin-arm64.tar.gz -C darwin/arm64 azd-drasi

      - name: Generate registry.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/generate-registry.py "${VERSION}" "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" dist

      - name: Upload archives
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-archives
          path: |
            dist/azd-drasi-windows-amd64.zip
            dist/azd-drasi-linux-amd64.tar.gz
            dist/azd-drasi-linux-arm64.tar.gz
            dist/azd-drasi-darwin-amd64.tar.gz
            dist/azd-drasi-darwin-arm64.tar.gz
            dist/registry.json
          if-no-files-found: error

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-archives
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Drasi azd Extension ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/azd-drasi-windows-amd64.zip \
            dist/azd-drasi-linux-amd64.tar.gz \
            dist/azd-drasi-linux-arm64.tar.gz \
            dist/azd-drasi-darwin-amd64.tar.gz \
            dist/azd-drasi-darwin-arm64.tar.gz \
            dist/registry.json

  update-registry:
    name: Update extension registry
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read
    env:
      REGISTRY_PAT_SET: ${{ secrets.REGISTRY_PAT != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: env.REGISTRY_PAT_SET == 'true'
        with:
          persist-credentials: false

      - name: Open registry PR
        if: env.REGISTRY_PAT_SET == 'true'
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="azure/azd-extensions-registry"
          BRANCH="update-drasi-${VERSION}"

          gh repo clone "${REPO}" registry-clone
          cd registry-clone

          # Update the version field for the drasi extension entry
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" registry.yaml 2>/dev/null || \
          grep -q "drasi" registry.yaml && \
          python3 - <<EOF
          import re, sys
          content = open("registry.yaml").read()
          # Replace version under the drasi namespace block
          updated = re.sub(
              r'(namespace:\s+drasi\b.*?version:\s+")[^"]+(")',
              r'\g<1>${VERSION}\g<2>',
              content,
              flags=re.DOTALL
          )
          open("registry.yaml", "w").write(updated)
          EOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "${BRANCH}"
          git add registry.yaml
          git commit -m "chore(registry): bump drasi extension to ${VERSION}"
          git push origin "${BRANCH}"

          gh pr create \
            --repo "${REPO}" \
            --head "${BRANCH}" \
            --base main \
            --title "chore: bump drasi extension to ${VERSION}" \
            --body "Automated bump from release ${GITHUB_REF_NAME} in azure/azd.extensions.drasi."
