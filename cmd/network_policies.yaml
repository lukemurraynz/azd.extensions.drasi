# Drasi baseline NetworkPolicies for Cilium-backed AKS clusters.
#
# Architecture:
#   drasi-system  — Drasi API, resource-provider, query-host, view-svc, publish-api, mongo, redis
#   dapr-system   — Dapr control plane (placement, sentry, operator, sidecar-injector)
#
# kubectl port-forward traffic originates from the kubelet on the node (not from
# a pod), so namespace selectors cannot match it. Policies that serve port-forwarded
# services must allow ingress from all sources on the target port.
# ---------------------------------------------------------------------------
# 1. Default deny — blocks all traffic unless explicitly allowed below.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drasi-default-deny
  namespace: drasi-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# ---------------------------------------------------------------------------
# 2. Intra-namespace — all pods in drasi-system can talk to each other.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drasi-allow-internal
  namespace: drasi-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: drasi-system
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: drasi-system
---
# ---------------------------------------------------------------------------
# 3. DNS — all pods need CoreDNS in kube-system.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drasi-allow-dns
  namespace: drasi-system
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# ---------------------------------------------------------------------------
# 4. HTTPS egress — Key Vault, AAD/Entra token endpoints, Azure Monitor, ACR.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drasi-allow-azure-api-egress
  namespace: drasi-system
  annotations:
    description: Required for Key Vault, AAD token endpoint, Azure Monitor, and ACR HTTPS traffic
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: TCP
      port: 443
---
# ---------------------------------------------------------------------------
# 5. Dapr control plane — sidecars must reach placement, sentry, operator
#    in dapr-system namespace.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drasi-allow-dapr-control-plane
  namespace: drasi-system
  annotations:
    description: Dapr sidecars need egress to dapr-system for placement, sentry, and operator
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dapr-system
    ports:
    - protocol: TCP
      port: 50005  # Dapr Placement
    - protocol: TCP
      port: 50001  # Dapr Placement (legacy port)
    - protocol: TCP
      port: 443    # Dapr Sentry (mTLS cert issuance)
    - protocol: TCP
      port: 50006  # Dapr Sentry gRPC
    - protocol: TCP
      port: 6500   # Dapr Scheduler
---
# ---------------------------------------------------------------------------
# 6. Drasi API — accept port-forward ingress on port 8080.
#    kubectl port-forward originates from the kubelet, not from a pod, so the
#    source cannot be matched by a namespace or pod selector.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drasi-allow-api-ingress
  namespace: drasi-system
  annotations:
    description: Allows kubectl port-forward and drasi CLI access to the Drasi API
spec:
  podSelector:
    matchLabels:
      drasi/infra: api
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 8080
---
# ---------------------------------------------------------------------------
# 7. Kubernetes API egress — resource-provider watches resources via K8s API.
#    AKS API server listens on port 443 (not 6443).
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drasi-allow-k8s-api
  namespace: drasi-system
  annotations:
    description: Required for resource-provider pod to access Kubernetes API
spec:
  podSelector:
    matchLabels:
      drasi/infra: resource-provider
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
---
# ---------------------------------------------------------------------------
# 8. Common data source/reaction egress — baseline ports for external
#    databases and messaging systems that Drasi sources/reactions connect to.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: drasi-allow-common-data-egress
  namespace: drasi-system
  annotations:
    description: Baseline external data egress for source/reaction endpoints
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: TCP
      port: 5432   # PostgreSQL
    - protocol: TCP
      port: 3306   # MySQL
    - protocol: TCP
      port: 1433   # SQL Server
    - protocol: TCP
      port: 9092   # Kafka
    - protocol: TCP
      port: 5671   # Azure Event Hubs AMQP over TLS
    - protocol: TCP
      port: 8081   # Cosmos DB Gremlin endpoint
    - protocol: TCP
      port: 10255  # Cosmos DB MongoDB endpoint / Direct mode control
    - protocol: TCP
      port: 10256  # Cosmos DB Direct mode control
    - protocol: TCP
      port: 27017  # MongoDB (external)
  # Cosmos DB Direct mode (rntbd) — the .NET SDK uses TCP connections on the
  # 11000–11999 port range when operating in Direct connectivity mode.
  # NetworkPolicy does not support port ranges, so we use a separate rule with
  # endPort to cover the entire range.
  - ports:
    - protocol: TCP
      port: 11000
      endPort: 11999
