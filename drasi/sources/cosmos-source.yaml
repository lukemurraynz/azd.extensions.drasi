# cosmos-source.yaml — Drasi Source definition for Azure Cosmos DB (Gremlin API)
# Replace Key Vault reference URIs with your own secret URIs.
apiVersion: v1
kind: Source
metadata:
  name: cosmos-source
spec:
  kind: CosmosGremlin
  properties:
    accountEndpoint:
      kind: Secret
      provider: inline
      value: "https://<your-cosmos-account>.documents.azure.com:443/"
    masterKey:
      kind: Secret
      provider: inline
      value: "<your-cosmos-account-key>"
    database: "<your-database>"
    container: "<your-container>"
