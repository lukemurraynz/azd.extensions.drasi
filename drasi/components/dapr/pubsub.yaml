# pubsub.yaml — Dapr pub/sub component for local development (FR-031)
# Replace the metadata values with your broker connection details for production.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: drasi-pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: "localhost:6379"
    - name: redisPassword
      value: ""
